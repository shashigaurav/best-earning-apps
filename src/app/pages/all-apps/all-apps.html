<div class="container">

  <h2 class="section-title">All Apps</h2>

  <p>Total Games: {{ games.length }}</p>

  <div class="apps">

    <div *ngFor="let game of games" class="card">

      <!-- Popular Badge -->
      <div class="popular" *ngIf="game.popular">
        🔥 Popular
      </div>

      <!-- App Details -->
      <a [routerLink]="['/app', game.id]" class="app-link">

        <img
          [src]="game.image"
          [alt]="game.appName"
          class="app-img"
          loading="lazy"
        >

        <h3 class="app-name">
          {{ game.appName }}
        </h3>

      </a>

      <!-- Rating -->
      <div class="rating">

        <span *ngFor="let s of [1,2,3,4,5]">
          <span *ngIf="s <= game.rating">⭐</span>
          <span *ngIf="s > game.rating" class="grey">⭐</span>
        </span>

      </div>

      <!-- Downloads -->
      <p class="downloads">
        📥 {{ game.downloads || 0 }} Downloads
      </p>

      <!-- Bonus -->
      <p class="bonus">
        ₹{{ game.bonus || 0 }}
      </p>

      <!-- Install Button -->
      <a [href]="game.downloadLink" target="_blank">

        <button class="install-btn">
          Install & Earn
        </button>

      </a>

    </div>

  </div>

</div>
