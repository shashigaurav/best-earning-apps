<header class="navbar">

  <div class="nav-container">

    <!-- ===================== -->
    <!-- LOGO -->
    <!-- ===================== -->

    <a
      class="logo"
      routerLink="/"
    >

      <img
        src="/logo.png"
        alt="Best Earning Apps Logo"
      >

      <div class="logo-text">

        <span class="brand-name">
          BestEarningApps
        </span>

        <small>
          Play • Earn • Win
        </small>

      </div>

    </a>

    <!-- ===================== -->
    <!-- SEARCH -->
    <!-- ===================== -->

    <div class="search-box">

      <app-search></app-search>

    </div>

    <!-- ===================== -->
    <!-- NAVIGATION -->
    <!-- ===================== -->

    <nav [class.active]="menuOpen">

      <a
        routerLink="/"
        routerLinkActive="active-link"
      >
        Home
      </a>

      <a
        routerLink="/all-apps"
        routerLinkActive="active-link"
      >
        All Apps
      </a>

      <a
        routerLink="/new-apps"
        routerLinkActive="active-link"
      >
        New Apps
      </a>

      <a
        routerLink="/blog"
        routerLinkActive="active-link"
      >
        Blog
      </a>

      <!-- TELEGRAM -->

      <a
        href="https://t.me/yourtelegram"
        target="_blank"
        class="telegram-btn-nav"
      >

        📢 Join Telegram

      </a>

    </nav>

    <!-- ===================== -->
    <!-- MOBILE MENU -->
    <!-- ===================== -->

    <button
      class="menu-icon"
      (click)="toggleMenu()"
      aria-label="Toggle Menu"
    >

      ☰

    </button>

  </div>

</header>
