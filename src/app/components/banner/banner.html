<div class="banner">

  <!-- SLIDER -->

  <div class="banner-slide">

    <img
      [src]="banners[current]"
      alt="Top Earning Apps Banner"
      loading="eager"
    >

    <!-- OVERLAY -->

    <div class="banner-overlay">

      <span class="banner-badge">
        🔥 Trusted Apps
      </span>

      <h1>
        Play Games & Earn Real Money
      </h1>

      <p>
        Discover the best earning apps with instant withdrawal and daily rewards.
      </p>

      <div class="banner-buttons">

        <button class="primary-btn">
          🚀 Start Earning
        </button>

        <button class="secondary-btn">
          🔥 Trending Apps
        </button>

      </div>

    </div>

  </div>

  <!-- NAVIGATION -->

  <button
    class="nav left"
    (click)="prevSlide()"
    aria-label="Previous Banner"
  >
    ❮
  </button>

  <button
    class="nav right"
    (click)="nextSlide()"
    aria-label="Next Banner"
  >
    ❯
  </button>

  <!-- DOTS -->

  <div class="dots">

    <span
      *ngFor="
        let banner of banners;
        let i = index;
        trackBy: trackByIndex
      "
      [class.active]="i === current"
      (click)="goToSlide(i)"
    >
    </span>

  </div>

</div>
