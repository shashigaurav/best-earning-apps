<div class="manage-container">

  <h2>Manage Games</h2>

  <!-- DEBUG -->
  <p><b>Loading:</b> {{ loading }}</p>
  <p><b>Games Count:</b> {{ games.length }}</p>

  <!-- LOADING -->
  <p *ngIf="loading" class="loading">
    Loading games...
  </p>

  <!-- ERROR -->
  <p *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </p>

  <!-- SUCCESS -->
  <p *ngIf="successMessage" class="success">
    {{ successMessage }}
  </p>

  <!-- TABLE -->
  <table class="games-table" *ngIf="!loading && games.length > 0">

    <thead>
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>App Name</th>
        <th>Bonus</th>
        <th>Category</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let game of games">

        <td>{{ game.id }}</td>

        <td>
          <img
            *ngIf="game.image"
            [src]="'https://best-earning-apps-backend.onrender.com/' + game.image"
            alt="app image"
            width="60"
            height="60">
        </td>

        <td>{{ game.appName }}</td>

        <td>₹{{ game.bonus }}</td>

        <td>{{ game.category }}</td>

        <td>
          <button
            class="delete-btn"
            (click)="deleteGame(game.id!)">
            Delete
          </button>
        </td>

      </tr>
    </tbody>

  </table>

  <!-- EMPTY -->
  <p *ngIf="!loading && games.length === 0">
    No games found
  </p>

</div>
