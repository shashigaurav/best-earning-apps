<div class="manage-container">

  <h2>Manage Games</h2>

  <!-- LOADING -->
  <p *ngIf="loading" class="loading">Loading games...</p>

  <!-- ERROR -->
  <p *ngIf="errorMessage" class="error">{{errorMessage}}</p>

  <!-- SUCCESS -->
  <p *ngIf="successMessage" class="success">{{successMessage}}</p>

  <!-- TABLE -->
  <table class="games-table" *ngIf="!loading">

    <thead>
      <tr>
        <th>ID</th>
        <th>App</th>
        <th>Bonus</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let game of games">

        <td>{{game.id}}</td>

        <td class="app-cell">
          <img [src]="'http://localhost:8080/uploads/'+game.image">
          <span>{{game.appName}}</span>
        </td>

        <td>₹{{game.bonus}}</td>

        <td>
          <button class="delete-btn" (click)="deleteGame(game.id)">
            Delete
          </button>
        </td>

      </tr>
    </tbody>

  </table>

</div>
