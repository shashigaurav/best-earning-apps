<h1>TEST PAGE</h1>

<p>Loading = {{ loading }}</p>

<p>Total Games = {{ games.length }}</p>

<button (click)="loading = false">
  Force Loading False
</button>

<button (click)="games = [{id:1, appName:'TEST'} as any]">
  Add Test Game
</button>

<div *ngIf="!loading">
  LOADING FALSE
</div>

<div *ngIf="games.length > 0">
  GAMES FOUND
</div>
