<div class="form-card">

  <h2>Add New Game</h2>

  <input
    type="text"
    placeholder="App Name"
    [(ngModel)]="appName">

  <input
    type="text"
    placeholder="Game Title"
    [(ngModel)]="gameTitle">

  <input
    type="text"
    placeholder="Bonus ₹"
    [(ngModel)]="bonus">

  <input
    type="text"
    placeholder="Image URL"
    [(ngModel)]="imageUrl">

  <input
    type="text"
    placeholder="Keywords"
    [(ngModel)]="keywords">

  <input
    type="text"
    placeholder="Download Link"
    [(ngModel)]="downloadLink">

  <select [(ngModel)]="category">
    <option value="all apps">All Apps</option>
    <option value="new apps">New Apps</option>
  </select>

  <button
    (click)="addGame()"
    [disabled]="loading">

    {{ loading ? 'Adding...' : 'Add Game' }}

  </button>

  <p class="success" *ngIf="message">
    {{ message }}
  </p>

  <p class="error" *ngIf="error">
    {{ error }}
  </p>

</div>
