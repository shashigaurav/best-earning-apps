<div class="dashboard">

  <h1>🚀 Admin Dashboard</h1>

  <!-- STATS -->
  <div class="stats">

    <div class="card">
      <h3>Total Apps</h3>
      <p>{{totalGames}}</p>
    </div>

    <div class="card">
      <h3>New Apps</h3>
      <p>{{newApps}}</p>
    </div>

  </div>

  <!-- ACTIONS -->
  <div class="actions">

    <a routerLink="/admin/add-game" class="action-card">
      ➕ Add Game
    </a>

    <a routerLink="/admin/manage-games" class="action-card">
      ⚙ Manage Games
    </a>

  </div>

  <!-- LOGOUT -->
  <button class="logout-btn" (click)="logout()">
    Logout
  </button>

</div>
